services:
  - type: web
    name: sinai-assistant
    runtime: ruby
    repo: https://github.com/sinailtda28-afk/sinai-assistant
    plan: free
    buildCommand: |
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails db:migrate
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: DATABASE_PATH
        value: db/production.sqlite3
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY_BASE
        value: "28c0ffc2ceabd6b2fad5ec46fe4fc773d8643dc8922fb4c3655bbf1df47d375aa73e4ca33526bfe6982fe7badb0012ef15c5e3e40b76ec4891f57b60672ef071"
      - key: SECRET_KEY_BASE
        sync: false
